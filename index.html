<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Run RP</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#0b0b0b;
    color:white;
    overflow:hidden;
}

.bg{
    position:absolute;
    width:100%;
    height:100vh;
    /* ЗАМЕНИТЕ ССЫЛКУ НИЖЕ НА ВАШ ФОН */
    background:url('blob:https://gemini.google.com/bfabc49d-ac06-4316-8f88-204ec98e4131') center/cover;
    filter:blur(3px);
    transform:scale(1.1);
}

.overlay{
    position:absolute;
    width:100%;
    height:100vh;
    background:rgba(0,0,0,.65);
}

.content{
    position:relative;
    z-index:2;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

h1{
    font-size:90px;
    color:#ff6600;
    text-shadow:0 0 30px #ff6600;
}

p{
    margin-top:10px;
    font-size:24px;
    opacity:.8;
}

.buttons{
    margin-top:40px;
    display:flex;
    gap:20px;
}

a{
    text-decoration:none;
}

.btn{
    padding:15px 35px;
    border-radius:12px;
    background:#ff6600;
    color:white;
    font-size:18px;
    transition:.3s;
    /* Добавляем это, чтобы кнопки не прыгали при нажатии */
    display: inline-block;
}

.btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 25px #ff6600;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="content">
    <h1>RUN RP</h1>
    <p>Новый GTA 5 RolePlay сервер</p>

    <div class="buttons">
        
        <a href="https://discord.gg/dubPZn67jj" class="btn" target="_blank">DISCORD</a>
        
        <!-- ВСТАВЬТЕ СЮДА IP И ПОРТ ВАШЕГО СЕРВЕРА -->
        <a href="rage://v/connect?ip=123.123.123.123:22005" class="btn">START</a>
    </div>
</div>

</body>
</html>
